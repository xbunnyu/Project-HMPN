<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himaphan Encyclopedia 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Sarabun:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 style="text-align: center; color: #d4af37; font-family: 'Cinzel'; margin-top: 30px; position: absolute; top: 0; width: 100%; z-index: 10;">HIMAPHAN CREATURES</h1>

    <div class="gallery-viewport">
        <div id="spinner" class="spinner"></div>
    </div>

    <div class="footer-text">The Legend of Himmapan Forest</div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="modal-body">
                <img id="modalImg" src="" alt="">
                <div class="text-content">
                    <h2 id="modalTitle">ชื่อสัตว์</h2>
                    <p id="modalCategory" style="color: #d4af37; font-style: italic; font-weight: bold; font-size: 1.2em; margin-bottom: 5px;"></p>
                    <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
                    
                    <div class="detail-item"><strong>ลักษณะทางกายภาพ:</strong> <div id="modalPhysical"></div></div>
                    <div class="detail-item"><strong>อุปนิสัยและพฤติกรรม:</strong> <span id="modalBehavior"></span></div>
                    <div class="detail-item"><strong>ถิ่นที่อยู่อาศัย:</strong> <span id="modalHabitat"></span></div>
                    <div class="detail-item"><strong>อิทธิฤทธิ์/ความสามารถพิเศษ:</strong> <span id="modalAbilities"></span></div>
                    <div class="detail-item"><strong>ตำนาน/เรื่องเล่าที่เกี่ยวข้อง:</strong> <span id="modalLore"></span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
